name: CI — Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/finpulse-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/finpulse-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|${{ env.BACKEND_IMAGE }}:.*|${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}|g" k8s/backend.yaml
          sed -i "s|${{ env.FRONTEND_IMAGE }}:.*|${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}|g" k8s/frontend.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ steps.tag.outputs.TAG }}"
          git push
