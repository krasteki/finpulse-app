apiVersion: apps/v1
kind: Deployment
metadata:
  name: finpulse-backend
  namespace: finpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finpulse-backend
  template:
    metadata:
      labels:
        app: finpulse-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/krasteki/finpulse-backend:decd8e254bdcb21dea1250453a363be8f6d25e6a
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finpulse-backend-secret
                  key: DATABASE_URL
            - name: FMP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finpulse-backend-secret
                  key: FMP_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finpulse-backend-secret
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finpulse-backend
  namespace: finpulse
spec:
  selector:
    app: finpulse-backend
  ports:
    - port: 8000
      targetPort: 8000
