apiVersion: apps/v1
kind: Deployment
metadata:
  name: finpulse-backend
  namespace: finpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finpulse-backend
  template:
    metadata:
      labels:
        app: finpulse-backend
    spec:
      serviceAccountName: finpulse
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/krasteki/finpulse-backend:f9b922bcc0cb7cfd4572edd09b6f8df7ceec05e7
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finpulse-backend-secret
                  key: DATABASE_URL
            - name: FMP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finpulse-backend-secret
                  key: FMP_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finpulse-backend-secret
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finpulse-backend
  namespace: finpulse
spec:
  selector:
    app: finpulse-backend
  ports:
    - port: 8000
      targetPort: 8000
