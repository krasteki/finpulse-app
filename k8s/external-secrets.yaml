---
# ExternalSecret resources за finpulse namespace
# External Secrets Operator автоматично pull-ва secrets от Vault
# и ги създава като K8s Secrets
#
# Prerequisites:
#   - ClusterSecretStore "vault-backend" е деплойнат (argocd/manifests/vault/)
#   - Vault е инициализиран и съдържа:
#       secret/finpulse/postgres  (POSTGRES_USER, POSTGRES_PASSWORD)
#       secret/finpulse/backend   (DATABASE_URL, FMP_API_KEY, OPENAI_API_KEY)
#
# ESO ще resfresh-ва secrets на всеки час автоматично.

# ---------------------------------------------------------------------- #
# finpulse-db-secret  ← secret/finpulse/postgres                        #
# ---------------------------------------------------------------------- #
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: finpulse-db-secret
  namespace: finpulse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: finpulse-db-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: finpulse/postgres
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: finpulse/postgres
        property: POSTGRES_PASSWORD
---
# ---------------------------------------------------------------------- #
# finpulse-backend-secret  ← secret/finpulse/backend                    #
# ---------------------------------------------------------------------- #
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: finpulse-backend-secret
  namespace: finpulse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: finpulse-backend-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: finpulse/backend
        property: DATABASE_URL
    - secretKey: FMP_API_KEY
      remoteRef:
        key: finpulse/backend
        property: FMP_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: finpulse/backend
        property: OPENAI_API_KEY
