apiVersion: apps/v1
kind: Deployment
metadata:
  name: finpulse-frontend
  namespace: finpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finpulse-frontend
  template:
    metadata:
      labels:
        app: finpulse-frontend
    spec:
      serviceAccountName: finpulse
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/krasteki/finpulse-frontend:f9b922bcc0cb7cfd4572edd09b6f8df7ceec05e7
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finpulse-frontend
  namespace: finpulse
spec:
  selector:
    app: finpulse-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finpulse-ingress
  namespace: finpulse
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - finpulse.k8s.local
      secretName: finpulse-tls
  rules:
    - host: finpulse.k8s.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: finpulse-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finpulse-frontend
                port:
                  number: 80
